name: SGO-IA Production Deployment (Cloudflare Tunnel)

on:
  push:
    branches:
      - main

jobs:
  validate-code:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4
      - name: Verify syntax (Dry Run)
        run: echo "Validando sintaxis..."

  deploy:
    runs-on: ubuntu-latest
    needs: validate-code
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      # 1. Instalar cloudflared en la máquina de GitHub
      - name: Install Cloudflare Tunnel Client
        run: |
          curl -L --output cloudflared.deb https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb
          sudo dpkg -i cloudflared.deb
          rm cloudflared.deb

      # 2. Levantar un proxy local en el runner apuntando a tu túnel
      # Esto abre el puerto local 2222 del runner y lo conecta de forma segura a tu servidor
      - name: Start Cloudflare SSH Proxy
        run: |
          cloudflared access tcp --hostname ${{ secrets.SSH_HOST }} --listener 127.0.0.1:2222 &
          sleep 5 # Esperamos unos segundos a que el túnel se enganche de forma estable

      # 3. Conectarse al puerto local del proxy (que redirige al servidor real)
      - name: Executing remote SSH commands over Tunnel
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 127.0.0.1                     # 🚀 Nos conectamos localmente porque el túnel ya está abierto aquí
          port: 2222                          # Usamos el puerto del listener de arriba
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e
            cd /home/sena/proyectos/sgo-ia
            
            git fetch origin main
            git reset --hard origin/main
            
            # 📝 ESCRITURA DEL .ENV CORRECTO DIRECTAMENTE EN LA CARPETA BACKEND
            cat <<EOF > backend/.env
            NODE_ENV=production
            PORT=3000
            DB_HOST=sgo-db
            DB_USER=root
            DB_PASSWORD=${{ secrets.DB_PASSWORD }}
            DB_NAME=${{ secrets.DB_NAME }}
            JWT_SECRET=${{ secrets.JWT_SECRET }}
            SESSION_SECRET=${{ secrets.SESSION_SECRET }}
            RESEND_API_KEY=${{ secrets.RESEND_API_KEY }}
            GOOGLE_CLIENT_ID=${{ secrets.GOOGLE_CLIENT_ID }}
            GOOGLE_CLIENT_SECRET=${{ secrets.GOOGLE_CLIENT_SECRET }}
            GOOGLE_CALLBACK_URL=${{ secrets.GOOGLE_CALLBACK_URL }}
            ANTHROPIC_API_KEY=${{ secrets.ANTHROPIC_API_KEY }}
            ANTHROPIC_MODEL=${{ secrets.ANTHROPIC_MODEL }}
            ANTHROPIC_MAX_TOKENS=${{ secrets.ANTHROPIC_MAX_TOKENS }}
            FRONTEND_URL=${{ secrets.FRONTEND_URL }}
            REDIS_HOST=sgo-redis
            REDIS_PORT=6379
            EOF
            
            # Orquestación de infraestructura
            docker compose down
            docker compose build --no-cache
            docker compose up -d --force-recreate
            
            # Limpieza preventiva de almacenamiento
            docker image prune -f