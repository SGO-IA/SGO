name: SGO-IA Production Deployment (Cloudflare Tunnel)

on:
  push:
    branches:
      - main

jobs:
  validate-code:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4
      - name: Verify syntax (Dry Run)
        run: echo "Validando sintaxis..."

  deploy:
    runs-on: ubuntu-latest
    needs: validate-code
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      # 1. Instalar cloudflared en el runner de GitHub
      - name: Install Cloudflare Tunnel Client
        run: |
          curl -L --output cloudflared.deb https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb
          sudo dpkg -i cloudflared.deb
          rm cloudflared.deb

      # 2. Inyectar la llave SSH privada de forma nativa en el agente del runner
      - name: Setup Private SSH Key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa

      # 3. Levantar el túnel en segundo plano apuntando al host local
      - name: Start Cloudflare SSH Proxy
        run: |
          cloudflared access tcp --hostname ${{ secrets.SSH_HOST }} --listener 127.0.0.1:2222 &
          sleep 5 

      # 4. Despliegue nativo con inyección de Secrets activada (EOF sin comillas)
      - name: Deploy to Server via Native SSH Over Tunnel
        run: |
          ssh -o StrictHostKeyChecking=no -i ~/.ssh/id_rsa -p 2222 ${{ secrets.SSH_USER }}@127.0.0.1 << EOF
            set -e
            
            # Nos paramos en la ruta física de tu Home
            cd /home/${{ secrets.SSH_USER }}/var/www/SGO
            
            # Actualizamos el repositorio
            git fetch origin main
            git reset --hard origin/main
            
            # 📁 Parche de compatibilidad para Docker Compose (Mayúsculas/Minúsculas)
            # Creamos accesos directos en minúscula si no existen para que Docker no falle
            if [ ! -e "backend" ]; then ln -s Backend backend; fi
            if [ ! -e "frontend" ]; then ln -s Frontend frontend; fi
            
            # 📝 ESCRITURA DEL .ENV DIRECTO EN LA CARPETA 'Backend' Real
            echo "NODE_ENV=production" > Backend/.env
            echo "PORT=3000" >> Backend/.env
            echo "DB_HOST=sgo-db" >> Backend/.env
            echo "DB_USER=root" >> Backend/.env
            echo "DB_PASSWORD=${{ secrets.DB_PASSWORD }}" >> Backend/.env
            echo "DB_NAME=${{ secrets.DB_NAME }}" >> Backend/.env
            echo "JWT_SECRET=${{ secrets.JWT_SECRET }}" >> Backend/.env
            echo "SESSION_SECRET=${{ secrets.SESSION_SECRET }}" >> Backend/.env
            echo "RESEND_API_KEY=${{ secrets.RESEND_API_KEY }}" >> Backend/.env
            echo "GOOGLE_CLIENT_ID=${{ secrets.GOOGLE_CLIENT_ID }}" >> Backend/.env
            echo "GOOGLE_CLIENT_SECRET=${{ secrets.GOOGLE_CLIENT_SECRET }}" >> Backend/.env
            echo "GOOGLE_CALLBACK_URL=${{ secrets.GOOGLE_CALLBACK_URL }}" >> Backend/.env
            echo "ANTHROPIC_API_KEY=${{ secrets.ANTHROPIC_API_KEY }}" >> Backend/.env
            echo "ANTHROPIC_MODEL=${{ secrets.ANTHROPIC_MODEL }}" >> Backend/.env
            echo "ANTHROPIC_MAX_TOKENS=${{ secrets.ANTHROPIC_MAX_TOKENS }}" >> Backend/.env
            echo "FRONTEND_URL=${{ secrets.FRONTEND_URL }}" >> Backend/.env
            echo "REDIS_HOST=sgo-redis" >> Backend/.env
            echo "REDIS_PORT=6379" >> Backend/.env
            
            echo "Archivo .env de Backend creado con éxito y Secrets inyectados."
            
            # Orquestación de infraestructura con Docker
            docker compose down
            docker compose build --no-cache
            docker compose up -d --force-recreate
            
            # Limpieza preventiva de almacenamiento
            docker image prune -f
          EOF