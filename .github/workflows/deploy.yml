name: SGO-IA Production Deployment (Cloudflare Tunnel)

on:
  push:
    branches:
      - main

jobs:
  validate-code:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4
      - name: Verify syntax (Dry Run)
        run: echo "Validando sintaxis..."

  deploy:
    runs-on: ubuntu-latest
    needs: validate-code
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      # 1. Instalar cloudflared en el runner de GitHub
      - name: Install Cloudflare Tunnel Client
        run: |
          curl -L --output cloudflared.deb https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb
          sudo dpkg -i cloudflared.deb
          rm cloudflared.deb

      # 2. Inyectar la llave SSH privada de forma nativa en el agente del runner
      - name: Setup Private SSH Key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa

      # 3. Levantar el túnel en segundo plano apuntando al host local
      - name: Start Cloudflare SSH Proxy
        run: |
          cloudflared access tcp --hostname ${{ secrets.SSH_HOST }} --listener 127.0.0.1:2222 &
          sleep 5 # Tiempo prudente para que el túnel sincronice

      # 4. Despliegue nativo usando el cliente SSH estándar de Linux
      - name: Deploy to Server via Native SSH Over Tunnel
        run: |
          ssh -o StrictHostKeyChecking=no -i ~/.ssh/id_rsa -p 2222 ${{ secrets.SSH_USER }}@127.0.0.1 << 'EOF'
            set -e
            cd /home/sena/proyectos/sgo-ia
            
            git fetch origin main
            git reset --hard origin/main
            
            # 📝 ESCRITURA DEL .ENV CORRECTO DIRECTAMENTE EN LA CARPETA BACKEND
            cat <<EOT > backend/.env
            NODE_ENV=production
            PORT=3000
            DB_HOST=sgo-db
            DB_USER=root
            DB_PASSWORD=${{ secrets.DB_PASSWORD }}
            DB_NAME=${{ secrets.DB_NAME }}
            JWT_SECRET=${{ secrets.JWT_SECRET }}
            SESSION_SECRET=${{ secrets.SESSION_SECRET }}
            RESEND_API_KEY=${{ secrets.RESEND_API_KEY }}
            GOOGLE_CLIENT_ID=${{ secrets.GOOGLE_CLIENT_ID }}
            GOOGLE_CLIENT_SECRET=${{ secrets.GOOGLE_CLIENT_SECRET }}
            GOOGLE_CALLBACK_URL=${{ secrets.GOOGLE_CALLBACK_URL }}
            ANTHROPIC_API_KEY=${{ secrets.ANTHROPIC_API_KEY }}
            ANTHROPIC_MODEL=${{ secrets.ANTHROPIC_MODEL }}
            ANTHROPIC_MAX_TOKENS=${{ secrets.ANTHROPIC_MAX_TOKENS }}
            FRONTEND_URL=${{ secrets.FRONTEND_URL }}
            REDIS_HOST=sgo-redis
            REDIS_PORT=6379
            EOT
            
            # Orquestación de infraestructura
            docker compose down
            docker compose build --no-cache
            docker compose up -d --force-recreate
            
            # Limpieza preventiva de almacenamiento
            docker image prune -f
          EOF