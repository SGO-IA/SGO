<button 
  (click)="toggleMobileMenu()"
  class="lg:hidden fixed top-4 left-4 z-50 w-11 h-11 bg-white border border-gray-100 text-sena-black rounded-2xl flex items-center justify-center shadow-md active:scale-95 transition-all duration-300"
>
  <i class="pi" [ngClass]="isMobileMenuOpen() ? 'pi-times' : 'pi-bars'"></i>
</button>

@if (isMobileMenuOpen()) {
  <div 
    (click)="closeMobileMenu()"
    class="lg:hidden fixed inset-0 bg-gray-900/20 backdrop-blur-sm z-40 transition-opacity duration-300"
  ></div>
}

<nav 
  [ngClass]="isMobileMenuOpen() ? 'translate-x-0' : '-translate-x-full lg:translate-x-0'"
  class="fixed lg:static top-0 left-0 h-screen w-72 lg:w-full z-45 bg-white/80 backdrop-blur-xl border-r border-gray-100 shadow-[20px_0_40px_rgba(0,0,0,0.02)] transition-transform duration-300 flex flex-col overflow-hidden"
>
  
  <div class="absolute -top-12 -left-12 w-32 h-32 bg-sena opacity-[0.02] rounded-full blur-2xl"></div>

  <div class="p-8 pt-20 lg:p-8 relative z-10">
    <div class="flex items-center gap-4">
      <div class="relative group">
        <div class="absolute inset-0 bg-sena blur-lg opacity-20 group-hover:opacity-40 transition-opacity"></div>
        <div class="relative w-11 h-11 bg-sena rounded-2xl flex items-center justify-center shadow-lg shadow-sena-alpha transform -rotate-3 group-hover:rotate-0 transition-all duration-500">
          <i class="pi pi-bolt text-white text-xl"></i>
        </div>
      </div>
      <div class="min-w-0">
        <h3 class="text-2xl font-black tracking-tighter text-sena-black leading-none">SGO</h3>
        <p class="text-[9px] text-sena font-bold uppercase tracking-[0.2em] mt-1 whitespace-nowrap">Gestión Operativa</p>
      </div>
    </div>
  </div>

  <ul class="flex-1 px-6 space-y-2 relative z-10 overflow-y-auto custom-scrollbar">
    <li *ngFor="let option of menuFiltrado">
      <a [routerLink]="option.route" 
         routerLinkActive="!bg-white !text-sena-black shadow-[0_10px_25px_-5px_rgba(57,169,0,0.15)] translate-x-1"
         [routerLinkActiveOptions]="{exact: true}"
         (click)="closeMobileMenu()"
         class="flex items-center gap-3 px-4 py-3.5 rounded-[1.25rem] transition-all duration-300 group relative text-gray-400 hover:text-sena hover:bg-sena/5 font-sans">
        
        <i [class]="'pi pi-' + option.icon + ' text-lg transition-all duration-300 group-hover:scale-110 group-hover:rotate-3'"></i>
        
        <span class="text-sm font-bold tracking-tight">{{ option.label }}</span>
        
        <div class="absolute left-1 w-1 h-4 bg-sena rounded-full scale-0 group-hover:scale-100 transition-transform"></div>
      </a>
    </li>
  </ul>

  <div class="p-6 border-t border-gray-50 bg-gray-50/30 backdrop-blur-md relative z-10">
    
    <div class="flex items-center gap-4 px-4 py-4 rounded-[2rem] bg-white border border-gray-100 shadow-sm mb-3 group hover:border-sena/20 transition-all duration-300">
      <div class="w-9 h-9 rounded-2xl bg-sena-alpha border border-sena/10 flex items-center justify-center text-sena">
        <i class="pi pi-user text-sm"></i>
      </div>
      <div class="min-w-0">
        <p class="text-[11px] font-black text-sena-black truncate leading-tight uppercase tracking-tight">
          {{ authService.currentUser()?.nombre }}
        </p>
        <div class="flex items-center gap-1.5 mt-0.5">
          <span class="w-1.5 h-1.5 rounded-full bg-sena animate-pulse"></span>
          <span class="text-[9px] text-gray-400 font-bold uppercase tracking-widest italic">En línea</span>
        </div>
      </div>
    </div>

    <button (click)="logout()" 
            class="w-full flex items-center justify-center gap-3 px-4 py-4 rounded-2xl text-gray-400 hover:bg-red-50 hover:text-red-600 transition-all duration-300 font-black text-[10px] uppercase tracking-widest group border border-transparent hover:border-red-100">
      <i class="pi pi-power-off group-hover:rotate-12 transition-transform"></i>
      <span>Cerrar Sesión</span>
    </button>

  </div>
</nav>
