<div class="bg-white p-8 rounded-[var(--radius-sena)] border border-gray-200 shadow-sm">
  <h2 class="text-2xl font-black text-sena-black mb-6">Apropiación del Conocimiento</h2>

  <div class="mb-6">
    <label class="block text-sm font-bold text-gray-700 mb-2">Título de la actividad</label>
    <input type="text" [(ngModel)]="titulo" class="input-sena w-full" placeholder="Título...">
  </div>

  <div class="mb-8">
    <label class="block text-sm font-bold text-gray-700 mb-2">Instrucciones de la Actividad</label>
    <textarea [(ngModel)]="contenido" class="input-sena !h-40 pt-4" placeholder="Describe la actividad..."></textarea>
    <button (click)="sugerirIA()" class="btn-sena mt-3 bg-sena-black"><i class="pi pi-sparkles"></i> Sugerir con IA</button>
  </div>

  <div class="grid md:grid-cols-2 gap-8">
    <div class="space-y-6">
      <div>
        <label class="block text-sm font-bold text-gray-700 mb-2">Tiempo estimado (minutos)</label>
        <input type="number" [(ngModel)]="duracion" class="input-sena !w-32">
      </div>

      <div>
        <label class="block text-sm font-bold text-gray-700 mb-2">Material de Apoyo</label>
        <div class="drop-zone-sena border-gray-300 !p-6">
          <input type="file" (change)="onFileSelected($event)" multiple class="hidden" id="fileUpload">
          <label for="fileUpload" class="cursor-pointer flex flex-col items-center">
            <i class="pi pi-paperclip text-2xl text-sena mb-1"></i>
            <span class="text-xs text-gray-500">Adjuntar documentos</span>
          </label>
        </div>
        @for (archivo of archivos; track $index) {
          <div class="flex items-center justify-between p-3 bg-gray-50 rounded-lg text-sm border mt-2">
            <span class="truncate">{{ archivo.name }}</span>
            <button (click)="removerRecurso($index)" class="text-red-500"><i class="pi pi-trash"></i></button>
          </div>
        }
      </div>
    </div>

    <div class="bg-gray-50 p-6 rounded-2xl border-2 border-dashed border-gray-200 flex flex-col justify-center items-center text-center">
      <i class="pi pi-file-check text-4xl text-sena mb-4"></i>
      <h3 class="font-black text-lg text-sena-black mb-2">Evaluación Asociada</h3>
      @if (!testConfigurado) {
        <button (click)="configurarTest()" class="btn-sena bg-sena text-white">Configurar Test</button>
      } @else {
        <span class="text-sena font-bold"><i class="pi pi-check-circle"></i> Configurado</span>
      }
    </div>
  </div>

  <div class="mt-8 flex justify-end">
    <button (click)="guardarEtapa()" class="btn-sena text-lg px-10 py-3">Guardar apropiación</button>
  </div>
</div>
