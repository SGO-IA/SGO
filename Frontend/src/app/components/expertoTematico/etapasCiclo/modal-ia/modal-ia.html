<div class="fixed inset-0 z-50 flex items-center justify-center bg-black/40 backdrop-blur-sm p-4">
    <div class="bg-white p-6 rounded-2xl w-full max-w-lg shadow-xl animate-in zoom-in duration-200">
        <h3 class="text-xl font-black text-sena-black mb-4">Instrucción personalizada</h3>
        <p class="text-sm text-gray-500 mb-4">Ingresa instrucciones específicas para guiar la generación de esta actividad.</p>
        
        <textarea 
            [(ngModel)]="customPrompt" 
            class="input-sena w-full h-32 border-gray-300 focus:border-sena focus:ring-1 focus:ring-sena transition-all" 
            placeholder="Ej: Enfócate en actividades prácticas sobre Angular (Mínimo 30 palabras)...">
        </textarea>

        <div class="flex justify-end mt-1">
            <span class="text-xs font-bold transition-colors" 
                  [class.text-red-500]="conteoPalabras < 30" 
                  [class.text-sena]="conteoPalabras >= 30">
                {{ conteoPalabras }} / 30 palabras
            </span>
        </div>
        
        <div class="flex justify-end gap-3 mt-4">
            <button (click)="close.emit()" class="btn-sena bg-gray-200 text-gray-700 hover:bg-gray-300 transition-colors">
                Cancelar
            </button>
            
            <button 
                (click)="submit.emit(customPrompt)" 
                [disabled]="conteoPalabras < 30"
                class="btn-sena bg-sena-black text-white transition-all disabled:bg-gray-300 disabled:text-gray-500 disabled:cursor-not-allowed hover:bg-black">
                Generar actividad
            </button>
        </div>
    </div>
</div>
