<div class="bg-white p-8 rounded-[var(--radius-sena)] border border-gray-200 shadow-sm">
  <h2 class="text-2xl font-black text-sena-black mb-6">Redacción de Reflexión Inicial</h2>

<div class="mb-8 relative">
  <textarea 
    [(ngModel)]="contenido" 
    [disabled]="loadingIA()"
    class="input-sena w-full resize-y min-h-[200px] pt-4 transition-opacity duration-500"
    [class.opacity-50]="loadingIA()"
    [placeholder]="loadingIA() ? mensajeActual() : 'Escribe aquí...'">
  </textarea>

  @if (loadingIA()) {
    <div class="absolute inset-0 flex flex-col items-center justify-center bg-white/90 z-10 backdrop-blur-[2px]">
      <div class="relative mb-4">
        <i class="pi pi-spinner pi-spin text-4xl text-sena"></i>
      </div>
      <p class="font-bold text-sena animate-in fade-in duration-700 text-center px-4">
        {{ mensajeActual() }}
      </p>
    </div>
  }

  <button 
    (click)="sugerirIA()" 
    [disabled]="loadingIA()"
    class="btn-sena mt-3 bg-sena-black disabled:bg-gray-400 transition-colors">
    <i class="pi pi-sparkles"></i> 
    {{ loadingIA() ? 'Generando...' : 'Sugerir con IA' }}
  </button>
</div>

  <div class="grid md:grid-cols-2 gap-8">
    
    <div>
      <label class="block text-sm font-bold text-gray-700 mb-2">Recursos (Archivos)</label>
      <div class="drop-zone-sena border-gray-300 mb-4">
        <input type="file" (change)="onFileSelected($event)" multiple class="hidden" id="fileUpload">
        <label for="fileUpload" class="cursor-pointer flex flex-col items-center">
          <i class="pi pi-cloud-upload text-3xl text-sena mb-2"></i>
          <span class="text-sm text-gray-500">Haz clic para subir archivos</span>
        </label>
      </div>
      <div class="space-y-2">
        @for (archivo of archivos; track archivo.name) {
          <div class="flex items-center justify-between p-3 bg-gray-50 rounded-lg text-sm border">
            <span class="truncate"><i class="pi pi-file mr-2 text-sena"></i>{{ archivo.name }}</span>
            <button (click)="archivos.splice($index, 1)" class="text-red-500"><i class="pi pi-trash"></i></button>
          </div>
        }
      </div>
    </div>

    <div>
      <label class="block text-sm font-bold text-gray-700 mb-2">Enlaces Externos</label>
      <input type="text" [(ngModel)]="nuevoLink" (keydown)="agregarLink($event)" 
             class="input-sena" placeholder="Pega el link y presiona Enter...">
      
      <div class="flex flex-wrap gap-2 mt-4">
        @for (link of links; track link) {
          <div class="flex items-center gap-2 bg-sena-alpha text-sena px-3 py-1 rounded-full text-sm font-semibold border border-sena/20">
            <i class="pi pi-link text-xs"></i>
            {{ link }}
            <button (click)="removerLink($index)" class="hover:text-sena-dark"><i class="pi pi-times"></i></button>
          </div>
        }
      </div>
    </div>
  </div>

  <div class="mt-8 flex justify-end">
    <button class="btn-sena text-lg px-10 py-3">Guardar reflexión</button>
  </div>
</div>
