<div class="flex gap-4 p-4 bg-gray-100 rounded-full">
  @for (fase of fases(); track fase.id) {
    <button 
        (click)="seleccionarFase(fase.id)"
        [class]="faseActiva() === fase.id ? 'bg-white shadow-md' : 'text-gray-500'"
        class="px-6 py-2 rounded-full font-bold transition-all"
    >
        {{ fase.nombre_fase }}
    </button>
  }
</div>
