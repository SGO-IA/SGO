<nav class="bg-white/80 backdrop-blur-md border-b border-gray-100 sticky top-0 z-50 transition-all duration-300">
  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
    <div class="flex justify-between h-20 items-center">
      
      <div class="flex items-center gap-10">
        <div routerLink="/" class="flex items-center gap-3 group cursor-pointer">
          <div class="w-11 h-11 bg-sena rounded-2xl flex items-center justify-center shadow-lg shadow-sena-alpha transform group-hover:rotate-6 transition-transform duration-300">
            <i class="pi pi-bolt text-white text-xl"></i>
          </div>
          <div class="flex flex-col">
            <span class="text-2xl font-black text-sena-black tracking-tighter leading-none">SGO</span>
            <span class="text-[8px] font-bold text-sena uppercase tracking-[0.2em]">CBI Palmira</span>
          </div>
        </div>

        <div class="hidden md:flex items-center gap-8">
          <a routerLink="/" routerLinkActive="text-sena" [routerLinkActiveOptions]="{exact: true}" class="text-sm font-bold text-sena-black hover:text-sena transition-colors flex items-center gap-2">
            Inicio
          </a>
          <a routerLink="/privacidad" routerLinkActive="text-sena" class="text-sm font-semibold text-gray-400 hover:text-sena-black transition-colors">
            Privacidad
          </a>
          <a routerLink="/ayuda" routerLinkActive="text-sena" class="text-sm font-semibold text-gray-400 hover:text-sena-black transition-colors">
            Ayuda
          </a>
        </div>
      </div>

      <div class="flex items-center gap-4">
        <button (click)="irAlLogin()" 
                class="hidden md:flex items-center gap-2 px-6 py-3 bg-sena text-white rounded-2xl font-black text-xs uppercase tracking-widest shadow-xl shadow-sena-alpha hover:bg-sena-black hover:shadow-none transform hover:-translate-y-0.5 transition-all duration-300">
          <i class="pi pi-sign-in text-sm"></i>
          <span>Ingresar al Sistema</span>
        </button>

        <button 
          (click)="toggleMobileMenu()"
          class="md:hidden w-11 h-11 bg-gray-50 border border-gray-100 text-sena-black rounded-2xl flex items-center justify-center active:scale-95 transition-all duration-300"
        >
          <i class="pi text-sm" [ngClass]="isMobileMenuOpen() ? 'pi-times' : 'pi-bars'"></i>
        </button>
      </div>

    </div>
  </div>
</nav>

<div 
  class="md:hidden fixed inset-0 z-[100] transition-all duration-300"
  [ngClass]="isMobileMenuOpen() ? 'pointer-events-auto visibility-visible' : 'pointer-events-none invisible'"
>

  <div 
    (click)="isMobileMenuOpen.set(false)"
    class="absolute inset-0 bg-gray-900/10 backdrop-blur-md transition-opacity duration-300 ease-out"
    [ngClass]="isMobileMenuOpen() ? 'opacity-100' : 'opacity-0'"
  ></div>

  <div 
    class="absolute top-0 right-0 h-screen w-72 bg-white border-l border-gray-100 p-6 flex flex-col justify-between shadow-[rgba(0,0,0,0.05)_0px_0px_40px] transition-transform duration-300 ease-out"
    [ngClass]="isMobileMenuOpen() ? 'translate-x-0' : 'translate-x-full'"
  >
    
    <div>
      <div class="flex items-center justify-between pb-6 border-b border-gray-50 mb-6">
        <span class="text-xs font-black text-gray-400 uppercase tracking-widest">Navegación</span>
        <button 
          (click)="isMobileMenuOpen.set(false)"
          class="w-8 h-8 rounded-full bg-gray-50 flex items-center justify-center text-gray-400 active:scale-90 transition-transform"
        >
          <i class="pi pi-times text-xs"></i>
        </button>
      </div>

      <div class="flex flex-col gap-2">
        <a 
          routerLink="/" 
          routerLinkActive="!text-sena bg-sena/5" 
          [routerLinkActiveOptions]="{exact: true}"
          (click)="isMobileMenuOpen.set(false)"
          class="text-sm font-bold text-sena-black hover:text-sena transition-all px-4 py-3.5 rounded-xl flex items-center gap-3"
        >
          <i class="pi pi-home"></i> Inicio
        </a>
        <a 
          routerLink="/privacidad" 
          routerLinkActive="!text-sena bg-sena/5"
          (click)="isMobileMenuOpen.set(false)"
          class="text-sm font-semibold text-gray-400 hover:text-sena-black transition-all px-4 py-3.5 rounded-xl flex items-center gap-3"
        >
          <i class="pi pi-shield"></i> Privacidad
        </a>
        <a 
          routerLink="/ayuda" 
          routerLinkActive="!text-sena bg-sena/5"
          (click)="isMobileMenuOpen.set(false)"
          class="text-sm font-semibold text-gray-400 hover:text-sena-black transition-all px-4 py-3.5 rounded-xl flex items-center gap-3"
        >
          <i class="pi pi-question-circle"></i> Ayuda
        </a>
      </div>
    </div>

    <div class="border-t border-gray-50 pt-4 mb-4">
      <button 
        (click)="irAlLogin()" 
        class="w-full flex items-center justify-center gap-2 px-6 py-4 bg-sena text-white rounded-2xl font-black text-xs uppercase tracking-widest shadow-lg shadow-sena-alpha active:scale-[0.98] transition-all"
      >
        <i class="pi pi-sign-in text-sm"></i>
        <span>Ingresar al Sistema</span>
      </button>
    </div>

  </div>

</div>
