<div *ngIf="visible" class="fixed inset-0 z-50 flex items-center justify-center bg-black/50 backdrop-blur-sm p-4">
  <div class="bg-white w-full max-w-2xl rounded-[var(--radius-sena)] shadow-2xl overflow-hidden animate-in zoom-in duration-200">
    
    <div class="bg-sena p-6 flex justify-between items-center text-white">
      <div class="flex items-center gap-3">
        <div class="bg-white/20 p-2 rounded-lg">
          <i class="pi pi-sparkles text-xl"></i>
        </div>
        <div>
          <h2 class="text-xl font-bold leading-none">Prueba de Diagnóstico IA</h2>
          <p class="text-[10px] text-white/80 mt-1 uppercase tracking-tighter">Evaluación de nivelación inicial</p>
        </div>
      </div>
      <button (click)="cerrar()" class="hover:bg-white/20 p-2 rounded-full transition-colors">
        <i class="pi pi-times"></i>
      </button>
    </div>

    <div class="p-8 max-h-[75vh] overflow-y-auto">

      <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
        
        <div class="space-y-2 md:col-span-2">
          <label class="block text-sm font-bold text-gray-700 ml-1">Título del Diagnóstico</label>
          <div class="relative">
            <i class="pi pi-tag absolute left-4 top-1/2 -translate-y-1/2 text-gray-400"></i>
            <input type="text" 
                   [(ngModel)]="configuracion.nombre_test"
                   placeholder="Ej: Diagnóstico de Conocimientos Previos"
                   class="input-sena">
          </div>
        </div>

        <div class="space-y-2 md:col-span-2">
          <label class="block text-sm font-bold text-gray-700 ml-1">Breve Descripción</label>
          <textarea 
            [(ngModel)]="configuracion.descripcion"
            rows="2"
            placeholder="Describe el propósito de este test"
            class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:border-sena outline-none transition-all text-sm resize-none"
          ></textarea>
        </div>

        <div class="space-y-2">
          <label class="block text-sm font-bold text-gray-700 ml-1">Número de Preguntas</label>
          <div class="relative">
            <i class="pi pi-list absolute left-4 top-1/2 -translate-y-1/2 text-gray-400"></i>
            <input type="number" [(ngModel)]="configuracion.cantidad_preguntas" class="input-sena">
          </div>
        </div>

        <div class="space-y-2">
          <label class="block text-sm font-bold text-gray-700 ml-1">Nivel de la Prueba</label>
          <div class="relative">
            <i class="pi pi-chart-bar absolute left-4 top-1/2 -translate-y-1/2 text-gray-400"></i>
            <select [(ngModel)]="configuracion.dificultad" class="input-sena appearance-none">
              <option value="basico">Básico (Fundamentos)</option>
              <option value="intermedio">Intermedio (Técnico)</option>
              <option value="avanzado">Avanzado (Experto)</option>
            </select>
          </div>
        </div>

        <div class="space-y-2 md:col-span-2">
          <label class="block text-sm font-bold text-gray-700 ml-1 flex items-center gap-2">
            Instrucciones para la IA
          </label>
          <textarea 
            [(ngModel)]="configuracion.instrucciones_adicionales"
            rows="3"
            placeholder="Ej: Enfócate en identificar si conocen los conceptos de Docker Swarm y balanceo de carga..."
            class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:border-sena outline-none transition-all text-sm resize-none bg-gray-50/50"
          ></textarea>
        </div>
      </div>
    </div>

    <div class="bg-gray-50 p-6 flex justify-end gap-3 border-t border-gray-100">
      <button (click)="cerrar()" 
              class="px-6 py-2.5 text-gray-500 font-bold hover:text-sena-black transition-colors text-sm">
        Cancelar
      </button>
      <button (click)="generar()" 
              [disabled]="cargando || !configuracion.nombre_test"
              class="btn-sena shadow-lg shadow-sena-alpha flex items-center gap-2 px-8">
        <i [class]="cargando ? 'pi pi-spin pi-spinner' : 'pi pi-bolt'"></i>
        {{ cargando ? 'Generando...' : 'Crear Diagnóstico' }}
      </button>
    </div>

  </div>
</div>
