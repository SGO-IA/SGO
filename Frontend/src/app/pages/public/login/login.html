<div class="min-h-screen bg-[radial-gradient(circle_at_top_right,_var(--color-sena-alpha),_transparent_40%),_radial-gradient(circle_at_bottom_left,_var(--color-sena-alpha),_transparent_40%)] bg-sena-gray-light flex flex-col justify-center py-12 sm:px-6 lg:px-8 font-sans relative overflow-hidden">
  
  <div class="absolute -top-24 -right-24 w-96 h-96 bg-sena opacity-[0.03] rounded-full blur-3xl"></div>
  <div class="absolute -bottom-24 -left-24 w-96 h-96 bg-sena opacity-[0.03] rounded-full blur-3xl"></div>

  <div class="hidden sm:flex absolute top-8 left-8 z-10">
    <a routerLink="/" class="flex items-center gap-3 text-gray-500 hover:text-sena transition-all duration-300 group bg-white/50 backdrop-blur-sm px-4 py-2 rounded-full border border-gray-100 shadow-sm">
      <i class="pi pi-arrow-left text-xs group-hover:-translate-x-1 transition-transform"></i>
      <span class="text-[10px] font-black uppercase tracking-[0.2em]">Inicio</span>
    </a>
  </div>

  <div class="sm:mx-auto sm:w-full sm:max-w-md text-center relative z-10">
    <h2 class="text-5xl font-black text-sena-black tracking-tighter leading-none">SGO</h2>
    <div class="flex items-center justify-center gap-2 mt-2">
      <span class="h-[1px] w-4 bg-sena/30"></span>
      <p class="text-[10px] text-sena font-bold uppercase tracking-[0.3em]">Gestión Operativa</p>
      <span class="h-[1px] w-4 bg-sena/30"></span>
    </div>
  </div>

  <div class="mt-10 sm:mx-auto sm:w-full sm:max-w-md relative z-10 px-4">
    <div class="bg-white/80 backdrop-blur-xl py-12 px-8 shadow-[0_32px_64px_-16px_rgba(57,169,0,0.1)] border border-white sm:rounded-[3rem] sm:px-12 relative overflow-hidden">
      
      <div *ngIf="mostrarInvitacion" class="mb-8 p-5 bg-sena/5 border border-sena/10 rounded-3xl animate-in fade-in slide-in-from-top-4 duration-500">
        <div class="flex items-center gap-4">
          <div class="flex-shrink-0 w-10 h-10 bg-white rounded-2xl shadow-sm flex items-center justify-center">
            <i class="pi pi-envelope text-sena"></i>
          </div>
          <div>
            <p class="text-[10px] font-black text-sena-dark uppercase tracking-wider">Invitación Detectada</p>
            <p class="text-xs text-gray-600 font-medium leading-tight mt-0.5">Acceso listo con tu cuenta institucional.</p>
          </div>
        </div>
      </div>

      <div *ngIf="errorLogin" class="mb-8 p-5 bg-red-50 border border-red-100 rounded-3xl animate-bounce-short text-center">
        <p class="text-[10px] font-black text-red-800 uppercase tracking-wider">Error de Acceso</p>
        <p class="text-xs text-red-600/80 font-medium mt-1 italic">{{ errorLogin }}</p>
      </div>

      <div class="space-y-6">
        
        <form (ngSubmit)="iniciarSesionManual()" class="space-y-4">
          <div class="relative">
            <i class="pi pi-user absolute left-4 top-1/2 -translate-y-1/2 text-gray-400"></i>
            <input 
              type="email" 
              name="correo"
              [(ngModel)]="correo"
              [disabled]="cargandoManual"
              placeholder="Correo electrónico" 
              class="input-sena pl-12 py-4 w-full disabled:opacity-50"
              required>
          </div>
          
          <div class="relative">
            <i class="pi pi-lock absolute left-4 top-1/2 -translate-y-1/2 text-gray-400"></i>
            <input 
              type="password" 
              name="contrasena"
              [(ngModel)]="contrasena"
              [disabled]="cargandoManual"
              placeholder="Contraseña" 
              class="input-sena pl-12 py-4 w-full disabled:opacity-50"
              required>
          </div>

          <button 
            type="submit"
            [disabled]="cargandoManual"
            class="w-full py-4 bg-sena text-white rounded-2xl font-bold text-sm shadow-lg shadow-sena-alpha hover:bg-sena-dark hover:-translate-y-0.5 transition-all duration-300 flex items-center justify-center gap-2 disabled:opacity-70 disabled:cursor-not-allowed disabled:transform-none">
            <i *ngIf="cargandoManual" class="pi pi-spin pi-spinner text-sm"></i>
            <span>{{ cargandoManual ? 'Verificando...' : 'Ingresar al Sistema' }}</span>
          </button>
        </form>

        <div class="relative py-2">
          <div class="absolute inset-0 flex items-center"><div class="w-full border-t border-gray-100"></div></div>
          <div class="relative flex justify-center text-[10px] uppercase font-black tracking-widest text-gray-300">
            <span class="bg-white px-4">O accede con</span>
          </div>
        </div>

        <button (click)="loginConGoogle()" 
                class="w-full flex items-center justify-center gap-4 px-6 py-4 border border-gray-100 rounded-2xl bg-gray-50/50 text-sm font-bold text-sena-black hover:bg-white hover:border-sena hover:shadow-xl hover:shadow-sena-alpha transition-all duration-500 group relative overflow-hidden">
          <div class="absolute inset-0 bg-gradient-to-r from-transparent via-white/40 to-transparent -translate-x-full group-hover:animate-shimmer"></div>
          <svg class="w-5 h-5 group-hover:scale-110 transition-transform" viewBox="0 0 24 24">
            <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
            <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
            <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>
            <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 1.16-4.53z" fill="#EA4335"/>
          </svg>
          <span class="group-hover:text-sena">Continuar con Google</span>
        </button>

        <div class="sm:hidden pt-2 flex justify-center">
          <a routerLink="/" class="flex items-center justify-center gap-2 text-gray-400 hover:text-sena border border-gray-100 bg-gray-50/30 transition-colors py-4 px-4 rounded-[2rem] text-[10px] font-black uppercase tracking-[0.2em] w-full">
            <i class="pi pi-arrow-left text-[9px]"></i>
            <span>Volver al Inicio</span>
          </a>
        </div>

      </div>
    </div>
  </div>
</div>
